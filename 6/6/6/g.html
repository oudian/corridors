<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="../../../index.css">
    <style>
        .ghost-image {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; 
            height: auto;
            z-index: 10; 
        }

        .dialog-box {
            position: absolute;
            bottom: 20%;
            width: 500px;
            height: 100px;
            display: none;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
            border-radius: 15px;
            z-index: 11;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .dialog-button {
            background: white;
            border: 2px solid black;
            border-radius: 15px;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 12;
        }

        .dialog-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border: 2px solid black;
            border-radius: 10px;
            z-index: 11;
        }
        .italic-text {
            font-style: italic;
            font-size: 16px;
        }
    </style>
    <title></title>
</head>
<body>
    <div class="container">
        <div class="rectangle">
            <div class="lamp" id="themeToggle"></div>
            <div class="line line-1"></div>
            <div class="line line-2"></div>
            <div class="line line-3"></div>
            <div class="line line-4"></div>
            <div class="line line-d"></div>
            <div class="line line-d mirrored"></div>
        </div>
    </div>

    <img id="ghostImage" src="girl.png" alt="Ghost" class="ghost-image">
    <div id="dialogText" class="dialog-text"></div>
    <div id="dialogBox" class="dialog-box"></div>



    <audio id="openSound" src="../../../open.mp3"></audio>
    <audio id="closedSound" src="../../../closed.mp3"></audio>
    <audio id="lampOnSound" src="../../../lamp_on.mp3"></audio>
    <audio id="lampOffSound" src="../../../lamp_off.mp3"></audio>

    <img id="backButton" src="../../../back.png" alt="Back" class="back-button">

    <script src="../../../lamp.js"></script>
    <script src="../../../back.js"></script>
    <script src="zoom.js"></script> 
    <script>
        const ghostImage = document.getElementById("ghostImage");
        const dialogBox = document.getElementById("dialogBox");
        const dialogText = document.getElementById("dialogText");
        let dialogState = localStorage.getItem("dialogState") || "start";

        function updateDialog(state) {
            localStorage.setItem("dialogState", state);
            dialogBox.innerHTML = "";
            dialogText.style.display = "none";
            
            if (state === "start") {
                dialogBox.style.display = "grid";
                addButton("Привет?", () => updateDialog("hello"));
                addButton("Где глава?", () => updateDialog("whereChapter"));
            } else if (state === "hello") {
                showText("Ты пришёл за главой?", () => {
                    dialogBox.style.display = "grid";
                    addButton("Да", () => updateDialog("yes"));
                    addButton("Нет", () => updateDialog("no"));
                });
            } else if (state === "yes") {
                showText("<span class='italic-text'>Ну, этот хотя бы честный...</span>");
            } else if (state === "no") {
                showText("А зачем? И как ты здесь тогда оказался? Обычно люди сюда всегда приходят за какой-то \"продой...\"", () => {
                    dialogBox.style.display = "grid";
                    addButton("Сказать правду", () => updateDialog("truth"));
                    addButton("Соврать", () => updateDialog("lie"));
                });
            } else if (state === "truth") {
                showText("Прости, я соврал. На самом деле я пришёл за этой самой продой.");
            } else if (state === "lie") {
                showText("Я слышал, что здесь обитают... эээ... призраки");
            } else if (state === "whereChapter") {
                showText("Что за грубая, невиданная наглость, требовать что-то от незнакомого призрака. Тебе что, в рифму ответить?");
            }
        }

        function addButton(text, callback) {
            const button = document.createElement("div");
            button.className = "dialog-button";
            button.innerText = text;
            button.onclick = callback;
            dialogBox.appendChild(button);
        }

        function showText(text, callback) {
            dialogText.innerHTML = text;
            dialogText.style.display = "flex";
            setTimeout(() => {
                if (callback) callback();
            }, 1000);
        }

        ghostImage.addEventListener("click", function() {
            if (this.src.includes("girl.png") && this.style.top === "50%") {
                updateDialog(dialogState);
            }
        });
    </script>
</body>
</html>
